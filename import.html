<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Import Dia Tabs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      width: 600px;
      max-width: 100%;
    }
    h1 {
      font-size: 22px;
      color: #fff;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #999;
      font-size: 13px;
      margin-bottom: 24px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #444;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #4a9eff;
      background: rgba(74, 158, 255, 0.05);
    }
    .drop-zone-text {
      color: #999;
      font-size: 14px;
    }
    .drop-zone-text strong {
      color: #4a9eff;
    }
    .drop-zone input[type="file"] {
      display: none;
    }

    /* Preview */
    .preview {
      display: none;
      background: #2d2d2d;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .preview.visible { display: block; }
    .preview h3 {
      font-size: 15px;
      color: #fff;
      margin-bottom: 12px;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #4a9eff;
    }
    .stat-label {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }

    .group-list {
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    .group-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: #1a1a1a;
    }
    .group-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .group-name {
      flex: 1;
      font-size: 13px;
    }
    .group-count {
      color: #666;
      font-size: 12px;
    }
    .group-tabs {
      padding-left: 34px;
      margin-bottom: 8px;
    }
    .group-tab {
      font-size: 11px;
      color: #888;
      padding: 2px 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .section-header {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 8px;
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 10px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }
    .btn-primary {
      background: #4a9eff;
      color: #fff;
      flex: 1;
    }
    .btn-secondary {
      background: #444;
      color: #ccc;
    }

    /* Progress */
    .progress {
      display: none;
      margin-top: 16px;
    }
    .progress.visible { display: block; }
    .progress-bar {
      height: 6px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      background: #4a9eff;
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }
    .progress-text {
      font-size: 12px;
      color: #999;
      text-align: center;
    }

    .color-map {
      grey: #5f6368; blue: #4a9eff; red: #ea4335;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Import Dia Tabs</h1>
    <p class="subtitle">Upload a JSON file exported from the Dia Tab Exporter extension.</p>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".json">
      <div class="drop-zone-text">
        <strong>Click to browse</strong> or drag and drop a JSON file here
      </div>
    </div>

    <div class="preview" id="preview"></div>

    <div class="progress" id="progress">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Importing...</div>
    </div>
  </div>
  <script src="import.js"></script>
</body>
</html>
