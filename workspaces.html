<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tab Workspaces</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 30px;
    }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { font-size: 22px; color: #fff; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }

    .save-section {
      background: #2d2d2d;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .save-section input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .save-section input:focus { border-color: #4a9eff; }
    .save-section input::placeholder { color: #666; }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: default; }
    .btn-blue { background: #4a9eff; color: #fff; }
    .btn-green { background: #34a853; color: #fff; }
    .btn-red { background: #ea4335; color: #fff; }
    .btn-grey { background: #444; color: #ccc; }

    .workspace-list { display: flex; flex-direction: column; gap: 12px; }

    .workspace-card {
      background: #2d2d2d;
      border-radius: 12px;
      padding: 16px;
      transition: border-color .15s;
      border: 1px solid transparent;
    }
    .workspace-card:hover { border-color: #444; }

    .workspace-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
    }
    .workspace-name {
      font-size: 16px; font-weight: 600; color: #fff; flex: 1;
    }
    .workspace-meta {
      font-size: 11px; color: #888;
    }
    .workspace-actions {
      display: flex; gap: 6px;
    }
    .workspace-actions button { padding: 6px 12px; font-size: 12px; }

    .workspace-stats {
      display: flex; gap: 16px; font-size: 12px; color: #999; margin-bottom: 8px;
    }
    .workspace-stats span { color: #4a9eff; font-weight: 600; }

    .workspace-tabs {
      max-height: 0;
      overflow: hidden;
      transition: max-height .3s ease;
    }
    .workspace-tabs.expanded { max-height: 500px; overflow-y: auto; }

    .ws-tab-item {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 0; font-size: 12px; color: #ccc;
    }
    .ws-tab-item img {
      width: 14px; height: 14px; border-radius: 2px;
    }
    .ws-tab-item .ws-tab-title {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .ws-tab-item .ws-tab-url {
      color: #666; font-size: 11px; max-width: 200px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .ws-group-label {
      font-size: 11px; font-weight: 600; color: #999;
      margin-top: 6px; margin-bottom: 2px; padding-left: 2px;
    }

    .toggle-tabs {
      background: none; border: none; color: #4a9eff; cursor: pointer;
      font-size: 12px; padding: 4px 0; font-weight: 500;
    }
    .toggle-tabs:hover { text-decoration: underline; }

    .empty-state {
      text-align: center; padding: 40px; color: #666; font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tab Workspaces</h1>
    <p class="subtitle">Save and restore sets of tabs, groups, and pinned tabs.</p>

    <div class="save-section">
      <input type="text" id="workspaceName" placeholder="Workspace name (e.g. Morning standup)">
      <button class="btn-blue" id="saveBtn">Save Current Tabs</button>
    </div>

    <div id="workspaceList" class="workspace-list">
      <div class="empty-state">Loading...</div>
    </div>
  </div>
  <script src="workspaces.js"></script>
</body>
</html>
